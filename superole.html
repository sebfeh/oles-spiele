<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ole's Abenteuer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html {
  width: 100%; height: 100%;
  height: 100dvh;
}
body {
  width: 100%; height: 100%;
  height: 100dvh;
  background: #1a1a2e;
  overflow: hidden;
  font-family: monospace;
  color: #eee;
  touch-action: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
#gameContainer {
  position: relative;
  width: min(100vw, calc((100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)) * 700 / 400));
  height: min(calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)), calc(100vw * 400 / 700));
  margin-top: env(safe-area-inset-top);
  margin-bottom: env(safe-area-inset-bottom);
}
#canvas {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  border: 1px solid #444;
  background: #87CEEB;
}
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 14px;
  font-size: 15px;
  color: #fff;
  text-shadow: 1px 1px 3px #000;
  pointer-events: none;
  z-index: 10;
}
#controls {
  position: absolute;
  bottom: 10px; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 14px;
  z-index: 10;
}
#controls-left { display: flex; gap: 10px; }
#controls-right { display: flex; }
.ctrl-btn {
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 50%;
  color: #eee;
  font-size: 22px;
  width: 64px; height: 64px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s;
  user-select: none;
}
.ctrl-btn:active { background: rgba(255,255,255,0.32); }
#info {
  display: none;
}
#portrait-hint {
  display: none;
  position: fixed; inset: 0;
  background: #1a1a2e;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; z-index: 100;
  text-align: center; padding: 30px;
}
#portrait-hint span { font-size: 64px; }
#portrait-hint p { font-size: 18px; color: #aaa; }
@media (orientation: portrait) {
  #portrait-hint { display: flex; }
  #gameContainer { display: none; }
}
@media (orientation: landscape) {
  #canvas { border-radius: 6px; }
}
/* Größere Buttons auf kleinen Screens */
@media (max-height: 420px), (max-dvh: 420px) {
  .ctrl-btn { width: 52px; height: 52px; font-size: 18px; }
  #hud { font-size: 13px; padding: 4px 10px; }
  #controls { bottom: 6px; padding: 0 10px; }
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: #fff;
  font-family: monospace;
  padding: 20px;
}
#overlay.active { display: flex; }
#overlay h2 { color: #FFD700; font-size: clamp(18px,4vw,28px); margin-bottom: 2px; text-align: center; }
#overlay .ov-score { font-size: clamp(14px,3vw,20px); color: #aef; }
#overlay .ov-hint { font-size: clamp(11px,2vw,14px); color: #aaa; text-align: center; }
#nameInput {
  background: rgba(255,255,255,0.12);
  border: 2px solid #FFD700;
  border-radius: 8px;
  color: #fff;
  font-family: monospace;
  font-size: clamp(16px,3vw,22px);
  padding: 8px 14px;
  text-align: center;
  width: min(240px, 80vw);
  outline: none;
}
#nameInput::placeholder { color: #666; }
.btn-row { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
.ov-btn {
  background: rgba(255,215,0,0.15);
  border: 2px solid #FFD700;
  border-radius: 8px;
  color: #FFD700;
  font-family: monospace;
  font-size: clamp(13px,2.5vw,16px);
  padding: 8px 18px;
  cursor: pointer;
  touch-action: manipulation;
}
.ov-btn:hover, .ov-btn:active { background: rgba(255,215,0,0.32); }
.ov-btn.primary { background: #FFD700; color: #1a1a2e; font-weight: bold; }
.ov-btn.primary:hover, .ov-btn.primary:active { background: #ffe033; }
#hs-table {
  border-collapse: collapse;
  margin-top: 4px;
  font-size: clamp(12px,2.2vw,15px);
  width: min(380px, 90vw);
}
#hs-table th {
  color: #FFD700;
  padding: 4px 10px;
  text-align: left;
  border-bottom: 1px solid #555;
}
#hs-table td { padding: 4px 10px; }
#hs-table tr.hl td { color: #FFD700; font-weight: bold; background: rgba(255,215,0,0.1); }
</style>
</head>
<body>

<div id="portrait-hint">
  <span>📱↔️</span>
  <p>Bitte drehe dein Gerät<br>ins <strong>Querformat</strong></p>
</div>

<div id="gameContainer">
  <canvas id="canvas" width="700" height="400"></canvas>
  <div id="hud">
    <span>⭐ <span id="score">0</span></span>
    <span id="levelLabel">Level 1</span>
    <span>❤️ <span id="lives">3</span></span>
  </div>
  <div id="controls">
    <div id="controls-left">
      <button class="ctrl-btn" id="btnLeft">◀</button>
      <button class="ctrl-btn" id="btnRight">▶</button>
    </div>
    <div id="controls-right">
      <button class="ctrl-btn" id="btnJump">▲</button>
    </div>
  </div>
</div>

<div id="overlay"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 700, H = 400;
canvas.width = W; canvas.height = H;
const LAVA_Y = 368;

// Vollbild + Querformat anfordern beim ersten Touch
let fullscreenRequested = false;
function requestFullscreenLandscape() {
  if (fullscreenRequested) return;
  fullscreenRequested = true;
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
document.addEventListener('touchstart', requestFullscreenLandscape, {once: true});
document.addEventListener('mousedown',  requestFullscreenLandscape, {once: true});
document.addEventListener('keydown',    requestFullscreenLandscape, {once: true});

let score = 0, lives = 3, level = 1, gameState = 'start', cameraX = 0;
let keys = {};

// ── Highscore ──────────────────────────────────────────────────────────────
const HIGHSCORE_API = 'highscore.php?game=superole';
let highscores = [];
let hsIsWin = false;

async function fetchHighscores() {
  try {
    const res = await fetch(HIGHSCORE_API);
    const data = await res.json();
    highscores = data.scores || [];
  } catch(e) { highscores = []; }
}

function qualifiesForHighscore(s) {
  if (s <= 0) return false;
  if (highscores.length < 10) return true;
  return s > highscores[highscores.length - 1].score;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showNameInput() {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>${hsIsWin ? '🏆 Gewonnen!' : 'Game Over'}</h2>
    <div class="ov-score">Punkte: ${score}</div>
    <div class="ov-hint">Du bist in den Top 10!<br>Gib deinen Namen ein:</div>
    <input type="text" id="nameInput" maxlength="20" placeholder="Dein Name" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="btn-row">
      <button class="ov-btn primary" id="btnSubmitScore">Eintragen</button>
      <button class="ov-btn" id="btnSkipScore">Überspringen</button>
    </div>`;
  ov.classList.add('active');
  const inp = document.getElementById('nameInput');
  inp.focus();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitHighscore();
    e.stopPropagation();
  });
  document.getElementById('btnSubmitScore').onclick = submitHighscore;
  document.getElementById('btnSkipScore').onclick  = () => showHighscoreList(-1);
}

async function submitHighscore() {
  const inp = document.getElementById('nameInput');
  const name = inp ? inp.value.trim() : '';
  if (!name) { if (inp) inp.focus(); return; }

  let hlIdx = -1;
  try {
    const res = await fetch(HIGHSCORE_API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, score})
    });
    if (res.status === 403) {
      showHighscoreList(-1);
      return;
    }
    const data = await res.json();
    if (data.scores) {
      highscores = data.scores;
      hlIdx = highscores.findIndex(s => s.name === name && s.score === score);
    }
  } catch(e) { /* ignore */ }
  showHighscoreList(hlIdx);
}

function showHighscoreList(hlIdx) {
  const ov = document.getElementById('overlay');
  let rows = '';
  if (highscores.length === 0) {
    rows = '<tr><td colspan="3" style="text-align:center;color:#888;padding:10px">Noch keine Einträge</td></tr>';
  } else {
    highscores.forEach((s, i) => {
      const hl = i === hlIdx ? ' class="hl"' : '';
      rows += `<tr${hl}><td>${i+1}.</td><td>${escHtml(s.name)}</td>`
            + `<td style="text-align:right">${s.score}</td>`
            + `<td style="color:#666;font-size:0.85em;padding-left:8px">${escHtml(s.date)}</td></tr>`;
    });
  }
  ov.innerHTML = `
    <h2>🏆 Highscores</h2>
    <table id="hs-table">
      <tr><th>#</th><th>Name</th><th style="text-align:right">Punkte</th><th></th></tr>
      ${rows}
    </table>
    <div class="btn-row">
      <button class="ov-btn primary" id="btnNewGame">Neues Spiel</button>
    </div>`;
  ov.classList.add('active');
  document.getElementById('btnNewGame').onclick = () => {
    ov.classList.remove('active');
    ov.innerHTML = '';
    resetGame();
  };
}

async function onGameEnd(win) {
  hsIsWin = win;
  gameState = 'overlay';
  await fetchHighscores();
  if (qualifiesForHighscore(score)) {
    showNameInput();
  } else {
    showHighscoreList(-1);
  }
}
// ──────────────────────────────────────────────────────────────────────────

function makeLevel(n) {
  const platforms = [
    {x:0,   y:340, w:200, h:20},
    {x:240, y:300, w:120, h:20},
    {x:420, y:260, w:100, h:20},
    {x:580, y:300, w:140, h:20},
    {x:780, y:260, w:130, h:20},
    {x:980, y:220, w:110, h:20},
    {x:1150,y:270, w:120, h:20},
    {x:1330,y:230, w:150, h:20},
    {x:1540,y:280, w:100, h:20},
    {x:1690,y:340, w:300, h:20},
    {x:1200,y:170, w:80,  h:20},
    {x:700, y:200, w:80,  h:20},
    {x:480, y:160, w:70,  h:20},
  ];
  const coins = [
    {x:280,y:270},{x:320,y:270},{x:460,y:230},{x:500,y:230},
    {x:620,y:270},{x:660,y:270},{x:820,y:230},{x:860,y:230},
    {x:1010,y:190},{x:1050,y:190},{x:1180,y:240},{x:1220,y:240},
    {x:1370,y:200},{x:1410,y:200},{x:1450,y:200},{x:1580,y:250},
    {x:720,y:170},{x:750,y:160},{x:1230,y:140},{x:1210,y:140},
    {x:90,y:300},{x:50,y:300},
  ];
  const enemies = [
    {x:700, y:318, dir:1,  speed:1+n*0.3},
    {x:1200,y:238, dir:-1, speed:1.2+n*0.3},
    {x:1730,y:318, dir:1,  speed:1.5+n*0.3},
    {x:600, y:278, dir:-1, speed:0.8+n*0.2},
  ];
  const goal = {x:1850, y:300, w:30, h:40};
  return {platforms, coins: coins.map(c=>({...c,collected:false})), enemies, goal, worldW:2000};
}

let player = {};
function initPlayer() {
  player = {x:30, y:260, w:20, h:30, vx:0, vy:0, onGround:false, facing:1, invincible:0, dead:false, burning:false, burnTimer:0};
}

let curLevel;
function startLevel() {
  curLevel = makeLevel(level);
  initPlayer();
  cameraX = 0;
  gameState = 'playing';
}

function resetGame() {
  score = 0; lives = 3; level = 1;
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('levelLabel').textContent = 'Level '+level;
  startLevel();
}

const GRAVITY = 0.5, JUMP = -11, SPEED = 3.5;

function getInput() {
  return {
    left:  keys['ArrowLeft'] ||keys['a']||keys['A']||touchLeft,
    right: keys['ArrowRight']||keys['d']||keys['D']||touchRight,
    jump:  keys['ArrowUp']   ||keys[' ']||keys['w']||keys['W']||touchJump
  };
}

let touchLeft=false, touchRight=false, touchJump=false;

function updatePlayer(inp) {
  if (player.burning) {
    player.burnTimer++;
    player.vy = Math.min(player.vy + 0.25, 2.5);
    player.y += player.vy;
    if (player.burnTimer > 90) loseLife();
    return;
  }
  if (player.dead) { player.vy += GRAVITY; player.y += player.vy; return; }
  if (inp.left)       { player.vx = -SPEED; player.facing = -1; }
  else if (inp.right) { player.vx =  SPEED; player.facing =  1; }
  else player.vx *= 0.8;

  if (inp.jump && player.onGround) { player.vy = JUMP; player.onGround = false; }
  player.vy += GRAVITY;
  if (player.vy > 14) player.vy = 14;

  player.x += player.vx;
  player.y += player.vy;
  if (player.x < 0) player.x = 0;
  if (player.x > curLevel.worldW - player.w) player.x = curLevel.worldW - player.w;

  player.onGround = false;
  for (let p of curLevel.platforms) {
    if (player.x+player.w > p.x && player.x < p.x+p.w &&
        player.y+player.h > p.y && player.y+player.h < p.y+p.h+16 && player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }
  if (player.invincible > 0) player.invincible--;
  if (player.y + player.h > LAVA_Y && !player.burning) {
    player.burning = true;
    player.burnTimer = 0;
    player.vx = 0;
  }
  if (player.y > H + 120) loseLife();
}

function loseLife() {
  lives--;
  document.getElementById('lives').textContent = lives;
  if (lives <= 0) { onGameEnd(false); return; }
  initPlayer(); cameraX = 0;
}

function updateEnemies() {
  for (let e of curLevel.enemies) {
    e.x += e.dir * e.speed;
    for (let p of curLevel.platforms) {
      if (e.x+16 > p.x && e.x < p.x+p.w && Math.abs(e.y+20 - p.y) < 4) {
        if (e.x <= p.x || e.x+16 >= p.x+p.w) e.dir *= -1;
        break;
      }
    }
    if (!player.dead && player.invincible === 0 &&
        player.x+player.w > e.x && player.x < e.x+16 &&
        player.y+player.h > e.y && player.y < e.y+20) {
      if (player.vy > 0 && player.y+player.h < e.y+10) {
        e.dead = true;
        score += 50;
        document.getElementById('score').textContent = score;
        player.vy = -7;
      } else {
        player.invincible = 90;
        lives--;
        document.getElementById('lives').textContent = lives;
        if (lives <= 0) onGameEnd(false);
      }
    }
  }
  curLevel.enemies = curLevel.enemies.filter(e=>!e.dead);
}

function updateCoins() {
  for (let c of curLevel.coins) {
    if (!c.collected &&
        player.x+player.w > c.x && player.x < c.x+14 &&
        player.y+player.h > c.y && player.y < c.y+14) {
      c.collected = true;
      score += 10;
      document.getElementById('score').textContent = score;
    }
  }
}

function checkGoal() {
  const g = curLevel.goal;
  if (player.x+player.w > g.x && player.x < g.x+g.w &&
      player.y+player.h > g.y && player.y < g.y+g.h) {
    level++;
    document.getElementById('levelLabel').textContent='Level '+level;
    if (level > 3) { onGameEnd(true); return; }
    startLevel();
  }
}

let t = 0;

function drawBG() {
  ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.85)';
  [[100,60],[300,40],[520,70],[620,50]].forEach(([cx,cy])=>{
    drawCloud(((cx - cameraX*0.15)%W+W)%W, cy);
  });
  drawLava();
}

function drawLava() {
  // Dunkle Lavabasis
  ctx.fillStyle='#6b0000';
  ctx.fillRect(0, LAVA_Y, W, H - LAVA_Y);

  // Mittlere Lavschicht
  ctx.fillStyle='#a81800';
  ctx.fillRect(0, LAVA_Y + 6, W, H - LAVA_Y - 6);

  // Animierte Lavaoberfläche mit Wellen
  ctx.fillStyle='#e02200';
  ctx.beginPath();
  ctx.moveTo(-2, H);
  ctx.lineTo(-2, LAVA_Y);
  for (let x = 0; x <= W + 10; x += 5) {
    let wave = Math.sin(x * 0.045 + t * 0.07) * 4
             + Math.sin(x * 0.08  - t * 0.05) * 2.5;
    ctx.lineTo(x, LAVA_Y + wave);
  }
  ctx.lineTo(W + 2, H);
  ctx.closePath();
  ctx.fill();

  // Helle Lava-Flecken (glühende Stellen)
  for (let i = 0; i < 7; i++) {
    let bx = ((i * 108 + t * 0.7) % (W + 60)) - 30;
    let pulse = 0.55 + Math.sin(t * 0.06 + i * 1.4) * 0.45;
    let r = Math.floor(255);
    let g = Math.floor(60 + pulse * 120);
    ctx.fillStyle = `rgba(${r},${g},0,${0.45 * pulse})`;
    ctx.beginPath();
    ctx.ellipse(bx, LAVA_Y + 6, 32 * pulse, 9 * pulse, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glüh-Schimmer über der Oberfläche
  let glow = ctx.createLinearGradient(0, LAVA_Y - 18, 0, LAVA_Y + 2);
  glow.addColorStop(0, 'rgba(255,80,0,0)');
  glow.addColorStop(1, 'rgba(255,60,0,0.28)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, LAVA_Y - 18, W, 20);
}

function drawCloud(x,y) {
  ctx.beginPath();
  ctx.arc(x,y,22,0,Math.PI*2);
  ctx.arc(x+20,y-10,18,0,Math.PI*2);
  ctx.arc(x+40,y,22,0,Math.PI*2);
  ctx.fill();
}

function worldToScreen(wx) { return wx - cameraX; }

function drawPlatforms() {
  for (let p of curLevel.platforms) {
    let sx = worldToScreen(p.x);
    if (sx > W || sx+p.w < 0) continue;
    ctx.fillStyle='#4a8c28';
    ctx.fillRect(sx, p.y, p.w, 6);
    ctx.fillStyle='#8B5E3C';
    ctx.fillRect(sx, p.y+6, p.w, p.h-6);
    ctx.fillStyle='#6b4423';
    for(let i=0;i<p.w;i+=8) ctx.fillRect(sx+i, p.y+8, 4, 2);
  }
}

function drawCoins() {
  for (let c of curLevel.coins) {
    if (c.collected) continue;
    let sx = worldToScreen(c.x);
    if (sx<-20||sx>W+20) continue;
    let bob = Math.sin(t*0.08+c.x*0.1)*2;
    ctx.save();
    ctx.translate(sx+7, c.y+7+bob);
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFA500';
    ctx.font='bold 8px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('$',0,0);
    ctx.restore();
  }
}

function drawEnemies() {
  for (let e of curLevel.enemies) {
    let sx = worldToScreen(e.x);
    if (sx<-30||sx>W+30) continue;
    ctx.save();
    ctx.translate(sx+8, e.y);
    ctx.fillStyle='#c0392b';
    ctx.beginPath(); ctx.arc(0,10,10,Math.PI,0); ctx.fill();
    ctx.fillStyle='#e74c3c';
    ctx.fillRect(-10,10,20,10);
    ctx.fillStyle='white';
    ctx.fillRect(-5,12,4,4); ctx.fillRect(1,12,4,4);
    ctx.fillStyle='#111';
    ctx.fillRect(-4+(e.dir>0?1:0),13,2,2);
    ctx.fillRect(2+(e.dir>0?1:0),13,2,2);
    ctx.restore();
  }
}

function drawGoal() {
  const g = curLevel.goal;
  let sx = worldToScreen(g.x);
  ctx.fillStyle='#888';
  ctx.fillRect(sx+14, g.y-60, 3, 100);
  ctx.fillStyle='#e74c3c';
  let wave = Math.sin(t*0.1)*4;
  ctx.beginPath();
  ctx.moveTo(sx+17, g.y-60);
  ctx.lineTo(sx+40+wave, g.y-48);
  ctx.lineTo(sx+17, g.y-38);
  ctx.fill();
  ctx.fillStyle='#FFD700';
  ctx.font='bold 11px sans-serif';
  ctx.fillText('ZIEL', sx+2, g.y-65);
}

function drawOle() {
  if (player.burning) { drawBurningOle(); return; }
  if (player.dead) { drawOleSprite(worldToScreen(player.x), player.y, 1, false, true); return; }
  if (player.invincible > 0 && Math.floor(player.invincible/6)%2===0) return;
  let walking = Math.abs(player.vx) > 0.5;
  let frame = walking ? Math.floor(t/8)%2 : 0;
  drawOleSprite(worldToScreen(player.x), player.y, player.facing, frame===1, false);
}

function drawBurningOle() {
  let sx = worldToScreen(player.x);
  let sy = player.y;
  let bt = player.burnTimer;
  let charProgress = Math.min(bt / 55, 1);

  // Ole nur oberhalb der Lava anzeigen (wird eingetaucht)
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, LAVA_Y + 3);
  ctx.clip();
  drawOleSprite(sx, sy, player.facing, false, false);
  // Verkohlungs-Overlay
  ctx.fillStyle = `rgba(15,0,0,${charProgress * 0.85})`;
  ctx.fillRect(sx - 3, sy, player.w + 6, player.h + 6);
  ctx.restore();

  // Flammen um Ole herum
  let cx = sx + player.w / 2;
  let cy = Math.min(sy + player.h * 0.45, LAVA_Y - 4);
  let flameCount = 11;
  for (let i = 0; i < flameCount; i++) {
    let a = (i / flameCount) * Math.PI * 2 + t * 0.13;
    let r = 13 + Math.sin(t * 0.38 + i * 1.1) * 5;
    let fx = cx + Math.cos(a) * r;
    let fy = cy + Math.sin(a) * r * 0.45;
    let fh = (18 + Math.sin(t * 0.33 + i * 0.95) * 9) * (0.4 + charProgress * 0.8);
    let fw = (4  + Math.sin(t * 0.27 + i * 1.3)  * 2) * (0.5 + charProgress * 0.6);

    ctx.save();
    let grad = ctx.createLinearGradient(fx, fy, fx, fy - fh);
    grad.addColorStop(0,   'rgba(255,230,50,0.98)');
    grad.addColorStop(0.3, 'rgba(255,100,0,0.85)');
    grad.addColorStop(0.7, 'rgba(200,20,0,0.5)');
    grad.addColorStop(1,   'rgba(150,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(fx - fw, fy);
    ctx.quadraticCurveTo(fx - fw * 2.2, fy - fh * 0.5, fx, fy - fh);
    ctx.quadraticCurveTo(fx + fw * 2.2, fy - fh * 0.5, fx + fw, fy);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Hitze-Schimmer-Halo
  if (charProgress > 0.2) {
    ctx.save();
    let halo = ctx.createRadialGradient(cx, cy, 5, cx, cy, 30 + charProgress * 15);
    halo.addColorStop(0,   `rgba(255,140,0,${0.25 * charProgress})`);
    halo.addColorStop(1,   'rgba(255,60,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 35 + charProgress * 10, 28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawOleSprite(sx, sy, dir, altFrame, dead) {
  ctx.save();
  ctx.translate(sx + player.w/2, sy);
  if (dir < 0) ctx.scale(-1,1);
  if (dead) { ctx.rotate(Math.PI); ctx.translate(-player.w/2, -player.h); }

  ctx.fillStyle='#333';
  ctx.fillRect(-9,26,9,5); ctx.fillRect(2,26,9,5);
  if (altFrame) { ctx.fillRect(-9,24,9,5); ctx.fillRect(2,28,9,5); }

  ctx.fillStyle='#3b5bdb';
  ctx.fillRect(-8,18,7,10); ctx.fillRect(2,18,7,10);

  ctx.fillStyle='#2ecc71';
  ctx.fillRect(-9,8,18,12);

  ctx.fillStyle='#FDBCB4';
  if (!altFrame) {
    ctx.fillRect(-14,8,5,10); ctx.fillRect(9,8,5,10);
  } else {
    ctx.fillRect(-14,10,5,10); ctx.fillRect(9,6,5,10);
  }

  ctx.fillStyle='#FDBCB4';
  ctx.beginPath(); ctx.arc(0,2,9,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#FFD700';
  ctx.fillRect(-9,-6,18,8);
  ctx.fillRect(-10,-4,4,16);
  ctx.fillRect(7,-4,4,14);
  ctx.fillRect(-11,0,3,12);

  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(-4,0,3,3); ctx.fillRect(2,0,3,3);
  ctx.fillStyle='white';
  ctx.fillRect(-3,0,1,1); ctx.fillRect(3,0,1,1);

  ctx.strokeStyle='#8B4513'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,4,3,0.1,Math.PI-0.1); ctx.stroke();

  if (Math.abs(player.vx)<0.5 && !dead) {
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.font='bold 9px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Ole', 0, -14);
  }
  ctx.restore();
}

function drawScreen(txt, sub='', sub2='') {
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFD700';
  ctx.font='bold 38px monospace';
  ctx.textAlign='center';
  ctx.fillText(txt, W/2, H/2-20);
  ctx.fillStyle='#fff';
  ctx.font='18px monospace';
  ctx.fillText(sub, W/2, H/2+20);
  if(sub2){ ctx.font='14px monospace'; ctx.fillStyle='#aaa'; ctx.fillText(sub2,W/2,H/2+50); }
}

let jumpPrev=false;
function loop() {
  t++;
  const inp = getInput();
  ctx.clearRect(0,0,W,H);

  if (gameState==='start') {
    drawBG();
    drawScreen("Ole's Abenteuer", '▲ zum Starten', 'Pfeiltasten / Buttons   |   H = Highscores');
    if ((inp.jump && !jumpPrev)||inp.left||inp.right) resetGame();
    if (keys['h']||keys['H']) {
      gameState='overlay';
      fetchHighscores().then(()=>showHighscoreList(-1));
    }
    jumpPrev=inp.jump;
    requestAnimationFrame(loop); return;
  }
  if (gameState==='overlay') {
    drawBG();
    requestAnimationFrame(loop); return;
  }

  updatePlayer(inp);
  updateEnemies();
  updateCoins();
  checkGoal();
  jumpPrev=inp.jump;

  let targetCam = player.x - W/3;
  if (targetCam < 0) targetCam = 0;
  if (targetCam > curLevel.worldW - W) targetCam = curLevel.worldW - W;
  cameraX += (targetCam - cameraX) * 0.15;

  drawBG();
  drawPlatforms();
  drawGoal();
  drawCoins();
  drawEnemies();
  drawOle();

  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e=>{ keys[e.key]=true; e.preventDefault(); });
document.addEventListener('keyup',   e=>{ keys[e.key]=false; });

const btnL = document.getElementById('btnLeft');
const btnR = document.getElementById('btnRight');
const btnJ = document.getElementById('btnJump');

function addTouch(btn, setter) {
  btn.addEventListener('touchstart', e=>{ e.preventDefault(); setter(true);  }, {passive:false});
  btn.addEventListener('touchend',   e=>{ e.preventDefault(); setter(false); }, {passive:false});
  btn.addEventListener('touchcancel',e=>{ e.preventDefault(); setter(false); }, {passive:false});
  btn.addEventListener('mousedown',  ()=> setter(true));
  btn.addEventListener('mouseup',    ()=> setter(false));
  btn.addEventListener('mouseleave', ()=> setter(false));
}
addTouch(btnL, v=>touchLeft=v);
addTouch(btnR, v=>touchRight=v);
addTouch(btnJ, v=>touchJump=v);

loop();
</script>
