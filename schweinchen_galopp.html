<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schweinchen Galopp</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
h1 { color: #fff; font-size: 22px; font-weight: 600; margin-bottom: 12px; letter-spacing: 1px; }
#gw { position: relative; width: min(100vw, 900px); height: min(calc(100vw * 0.58), 520px); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); }
#gc { display: block; width: 100%; height: 100%; }
#hud { position: absolute; top: 12px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; }
.hb { background: rgba(0,0,0,.42); color: #fff; border-radius: 8px; padding: 6px 20px; font-size: 17px; font-weight: 600; letter-spacing: .5px; }
#hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.42); color: #fff; border-radius: 8px; padding: 5px 16px; font-size: 13px; white-space: nowrap; pointer-events: none; transition: opacity .8s; }
#controls { margin-top: 14px; color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; line-height: 1.8; }
</style>
</head>
<body>
<h1>🐷 Schweinchen Galopp 🐒</h1>
<div id="gw">
  <canvas id="gc"></canvas>
  <div id="hud"><div class="hb">🍌 <span id="sc">0</span>/20 &nbsp;|&nbsp; ⏱ <span id="tm">0:00</span></div></div>
  <div id="win" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,.82);flex-direction:column;align-items:center;justify-content:center;color:#fff;overflow-y:auto;padding:20px 12px;">
    <div style="font-size:46px;margin-bottom:4px">🎉</div>
    <div style="font-size:28px;font-weight:700;margin-bottom:4px">Gewonnen!</div>
    <div style="font-size:17px;margin-bottom:14px">20 Bananen in <span id="wt" style="font-weight:700"></span></div>
    <div id="hs-form" style="display:flex;gap:8px;margin-bottom:14px">
      <input id="hs-name" type="text" maxlength="20" placeholder="Dein Name" style="padding:7px 12px;border-radius:8px;border:none;font-size:15px;width:145px;outline:none"/>
      <button id="hs-btn" style="padding:7px 16px;border-radius:8px;border:none;background:#FFD700;color:#333;font-weight:700;font-size:15px;cursor:pointer">Eintragen</button>
    </div>
    <div id="hs-list" style="width:min(320px,92%);background:rgba(255,255,255,.09);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:14px;min-height:40px"></div>
    <button id="hs-replay" style="padding:7px 22px;border-radius:8px;border:none;background:#4488ff;color:#fff;font-weight:700;font-size:15px;cursor:pointer">🔄 Nochmal</button>
  </div>
  <div id="hint">← → Lenken &nbsp;|&nbsp; ↑ Turbo &nbsp;|&nbsp; ↓ Bremsen &nbsp;|&nbsp; Wischen auf Touchscreen</div>
</div>
<div id="controls">Das Äffchen sitzt verkehrt herum – Bananen einsammeln!</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const canvas=document.getElementById('gc'),wrap=document.getElementById('gw'),scEl=document.getElementById('sc'),hint=document.getElementById('hint'),tmEl=document.getElementById('tm'),winEl=document.getElementById('win'),wtEl=document.getElementById('wt');
setTimeout(()=>hint.style.opacity='0',5000);
let W=wrap.clientWidth,H=wrap.clientHeight;
const R=new THREE.WebGLRenderer({canvas,antialias:true});
R.setSize(W,H);R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;

const S=new THREE.Scene();
S.background=new THREE.Color(0x77bbdd);
S.fog=new THREE.Fog(0x77bbdd,20,48);

const C=new THREE.PerspectiveCamera(65,W/H,.1,100);
S.add(new THREE.AmbientLight(0xffffff,.65));
const sun=new THREE.DirectionalLight(0xfff3cc,1.1);
sun.position.set(8,14,6);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);S.add(sun);

// Checkered ground texture
const tc=document.createElement('canvas');tc.width=tc.height=128;
const cx=tc.getContext('2d');
cx.fillStyle='#5aaa38';cx.fillRect(0,0,128,128);
cx.fillStyle='#4c9830';cx.fillRect(0,0,64,64);cx.fillRect(64,64,64,64);
const tex=new THREE.CanvasTexture(tc);
tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(30,30);

const gnd=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.MeshLambertMaterial({map:tex}));
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;S.add(gnd);

const mt=c=>new THREE.MeshLambertMaterial({color:c});
const M={pk:mt(0xffaabb),dpk:mt(0xee7799),br:mt(0x7B3A10),lbr:mt(0xC07030),
  yw:mt(0xFFD700),dyw:mt(0x8a6a00),blk:mt(0x111111),grn:mt(0x2a6e1e),trk:mt(0x6B4226),ns:mt(0xcc5577)};

const bx=(w,h,d,m,x,y,z)=>{const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(x,y,z);o.castShadow=true;return o;};

// === PIG ===
const pig=new THREE.Group();S.add(pig);
pig.add(bx(1.1,.65,.75,M.pk,0,.5,0));
pig.add(bx(.58,.5,.58,M.pk,.68,.65,0));
pig.add(bx(.14,.2,.08,M.dpk,.62,.93,.24));
pig.add(bx(.14,.2,.08,M.dpk,.62,.93,-.24));
const sn=new THREE.Mesh(new THREE.CylinderGeometry(.14,.16,.1,8),M.dpk);
sn.rotation.z=Math.PI/2;sn.position.set(.99,.62,0);pig.add(sn);
pig.add(bx(.03,.04,.04,M.ns,1.04,.65,.06));
pig.add(bx(.03,.04,.04,M.ns,1.04,.65,-.06));
pig.add(bx(.05,.06,.04,M.blk,.87,.8,.27));
pig.add(bx(.05,.06,.04,M.blk,.87,.8,-.27));
const legs=[];
[[.3,.3],[.3,-.3],[-.3,.3],[-.3,-.3]].forEach(([x,z])=>{const l=bx(.18,.33,.18,M.dpk,x,.17,z);pig.add(l);legs.push(l);});
const tg=new THREE.TorusGeometry(.13,.04,6,12,Math.PI*1.5);
const tm=new THREE.Mesh(tg,M.pk);tm.position.set(-.6,.62,0);tm.rotation.set(0,Math.PI/2,Math.PI/4);pig.add(tm);

// === MONKEY (backwards!) ===
const monk=new THREE.Group();
monk.position.set(-.05,.88,0);monk.rotation.y=-Math.PI/2;pig.add(monk);
monk.add(bx(.3,.38,.26,M.br,0,.19,0));
const mhd=new THREE.Mesh(new THREE.SphereGeometry(.19,12,12),M.br);
mhd.position.set(0,.52,0);mhd.castShadow=true;monk.add(mhd);
const mfc=new THREE.Mesh(new THREE.CircleGeometry(.13,12),M.lbr);
mfc.position.set(0,.49,.18);monk.add(mfc);
monk.add(bx(.05,.05,.05,M.blk,-.07,.56,.17));
monk.add(bx(.05,.05,.05,M.blk,.07,.56,.17));
monk.add(bx(.12,.02,.02,M.blk,0,.46,.18));
monk.add(bx(.1,.28,.1,M.br,-.22,.18,0));
monk.add(bx(.1,.28,.1,M.br,.22,.18,0));
monk.add(bx(.1,.25,.1,M.br,-.15,0,.18));
monk.add(bx(.1,.25,.1,M.br,.15,0,.18));
const mtg=new THREE.TorusGeometry(.15,.035,6,12,Math.PI*1.5);
const mtm=new THREE.Mesh(mtg,M.br);mtm.position.set(0,.08,-.16);mtm.rotation.x=-Math.PI/4;monk.add(mtm);

// === BANANAS ===
function mkBan(){
  const g=new THREE.Group();
  const pts=[];
  for(let i=0;i<=12;i++){const a=(i/12)*Math.PI*.62-.18;pts.push(new THREE.Vector3(Math.cos(a)*.22,Math.sin(a)*.22,0));}
  g.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),14,.056,8,false),M.yw));
  [pts[0],pts[pts.length-1]].forEach(p=>{const t=new THREE.Mesh(new THREE.SphereGeometry(.06,6,6),M.dyw);t.position.copy(p);g.add(t);});
  return g;
}

const WORLD=24,bans=[];
for(let i=0;i<20;i++){
  const b=mkBan();
  let x,z;do{x=(Math.random()-.5)*WORLD*2;z=(Math.random()-.5)*WORLD*2;}while(x*x+z*z<25);
  b.position.set(x,.42,z);S.add(b);bans.push(b);
}

// === TREES ===
const trees=[];
for(let i=0;i<28;i++){
  const t=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(.12,.16,.9,7),M.trk);tr.position.y=.45;t.add(tr);
  [0,1,2].forEach(j=>{const cn=new THREE.Mesh(new THREE.ConeGeometry(.7-j*.1,1.0,7),M.grn);cn.position.y=1.05+j*.5;t.add(cn);});
  let x,z;do{x=(Math.random()-.5)*52;z=(Math.random()-.5)*52;}while(x*x+z*z<42);
  t.position.set(x,0,z);S.add(t);trees.push(t);
}

// === CRASH STARS ===
const crashStars=new THREE.Group();crashStars.visible=false;S.add(crashStars);const starMeshes=[];
[0xFFFF00,0xFF8800,0xFFDD00,0xFF4400,0xFFAA00,0xFF6600].forEach(c=>{
  const s=new THREE.Mesh(new THREE.OctahedronGeometry(.1,0),mt(c));crashStars.add(s);starMeshes.push(s);
});
const crashOverlay=document.createElement('div');
crashOverlay.style.cssText='position:absolute;inset:0;background:rgba(255,80,0,0);pointer-events:none;border-radius:12px;transition:background .15s;';
wrap.appendChild(crashOverlay);
const collectOverlay=document.createElement('div');
collectOverlay.style.cssText='position:absolute;inset:0;background:rgba(80,255,80,0);pointer-events:none;border-radius:12px;transition:background .12s;';
wrap.appendChild(collectOverlay);

// === CLOUDS ===
for(let i=0;i<8;i++){
  const cl=new THREE.Group();
  const cm=mt(0xffffff);
  [[0,0,0,.7],[.5,-.1,0,.5],[-.5,-.1,0,.5],[.25,.3,0,.45],[-.25,.3,0,.45]].forEach(([cx,cy,cz,r])=>{
    const sp=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),cm);sp.position.set(cx,cy,cz);cl.add(sp);
  });
  cl.position.set((Math.random()-.5)*60,8+Math.random()*6,(Math.random()-.5)*60);
  S.add(cl);
}

// === CONTROLS ===
const collectEffects=[];let monkCollectStart=-999;
let score=0,angle=0,gameWon=false,startTime=null,treeHitTime=-999,crashActive=false,crashStart=0,finalScore=0;
const CRASH_DUR=1000;
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
let tx0=0;
canvas.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-tx0;keys['ArrowLeft']=dx<-15;keys['ArrowRight']=dx>15;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',()=>{keys['ArrowLeft']=keys['ArrowRight']=false;});

// === COLLECT EFFECT ===
function spawnCollectEffect(x,y,z){
  const g=new THREE.Group();const ms=[];
  [0xFFFF00,0xFFE000,0xFFC200,0xFFDD00,0xFF9900,0x88FF44,0x44FF88,0xFFAA00].forEach(c=>{
    const s=new THREE.Mesh(new THREE.OctahedronGeometry(.09,0),mt(c));g.add(s);ms.push(s);
  });
  g.position.set(x,y,z);S.add(g);collectEffects.push({g,ms,startT:-1,oy:y});
}

// === GAME LOOP ===
let lt=0;
function fmtTime(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');}
function loop(t){
  if(!gameWon)requestAnimationFrame(loop);
  const dt=Math.min((t-lt)/16.7,3);lt=t;
  if(startTime===null&&t>0)startTime=t;
  if(startTime!==null&&!gameWon)tmEl.textContent=fmtTime(t-startTime);

  const crashing=crashActive&&(t-crashStart<CRASH_DUR);
  if(crashActive&&!crashing){crashActive=false;crashStars.visible=false;pig.rotation.z=0;pig.position.y=0;}

  let spd=.075;
  if(!crashing){
    if(keys['ArrowLeft'])angle+=.036*dt;
    if(keys['ArrowRight'])angle-=.036*dt;
    spd=keys['ArrowUp']?.13:keys['ArrowDown']?.02:.075;
    pig.position.x+=Math.sin(angle)*spd*dt;
    pig.position.z+=Math.cos(angle)*spd*dt;
    pig.rotation.y=angle-Math.PI/2;
    if(pig.position.x>WORLD)pig.position.x=-WORLD;
    if(pig.position.x<-WORLD)pig.position.x=WORLD;
    if(pig.position.z>WORLD)pig.position.z=-WORLD;
    if(pig.position.z<-WORLD)pig.position.z=WORLD;
  }

  if(crashing){
    const cp=(t-crashStart)/CRASH_DUR;
    pig.rotation.z=Math.sin(cp*Math.PI*8)*.42*(1-cp*cp);
    pig.position.y=Math.abs(Math.sin(cp*Math.PI*3))*.22*(1-cp);
    pig.rotation.y=angle-Math.PI/2;
    legs[0].rotation.x=.55;legs[1].rotation.x=-.55;legs[2].rotation.x=.55;legs[3].rotation.x=-.55;
    crashStars.visible=true;
    crashStars.position.set(pig.position.x,pig.position.y+1.2,pig.position.z);
    starMeshes.forEach((s,i)=>{
      const a=(i/starMeshes.length)*Math.PI*2+t*.014;
      const r=.55+Math.sin(cp*Math.PI)*.22;
      s.position.set(Math.cos(a)*r,Math.sin(t*.018+i*.9)*.18,Math.sin(a)*r);
      s.rotation.x+=.12*dt;s.rotation.y+=.18*dt;
    });
  } else {
    const la=Math.sin(t*.015)*.5*(spd/.075);
    legs[0].rotation.x=la;legs[2].rotation.x=-la;
    legs[1].rotation.x=-la;legs[3].rotation.x=la;
  }

  const mcp=monkCollectStart>=0?Math.min((t-monkCollectStart)/650,1):-1;
  if(mcp>=0&&mcp<1){
    monk.position.y=.88+Math.sin(t*.02)*.018+Math.sin(mcp*Math.PI)*.28;
    monk.rotation.y=-Math.PI/2+mcp*Math.PI*2;
    monk.rotation.z=Math.sin(t*.007)*.07;
  } else {
    monk.position.y=.88+Math.sin(t*.02)*.018;
    monk.rotation.y=-Math.PI/2;
    monk.rotation.z=Math.sin(t*.007)*.07;
    if(mcp>=1)monkCollectStart=-999;
  }

  bans.forEach(b=>{
    if(!b.visible)return;
    b.rotation.y+=.03*dt;
    b.position.y=.42+Math.sin(t*.003+b.position.x)*.08;
    const dx=b.position.x-pig.position.x,dz=b.position.z-pig.position.z;
    if(dx*dx+dz*dz<1.3){
      b.visible=false;score++;scEl.textContent=score;
      collectOverlay.style.background='rgba(80,255,80,0.38)';
      setTimeout(()=>collectOverlay.style.background='rgba(80,255,80,0)',180);
      spawnCollectEffect(b.position.x,b.position.y,b.position.z);
      monkCollectStart=t;
      if(score>=20){gameWon=true;const elapsed=t-startTime;wtEl.textContent=fmtTime(elapsed);finalScore=Math.max(1,10000-Math.floor(elapsed/1000));showWin();return;}
      setTimeout(()=>{
        let nx,nz;
        do{nx=(Math.random()-.5)*WORLD*2;nz=(Math.random()-.5)*WORLD*2;}
        while((nx-pig.position.x)**2+(nz-pig.position.z)**2<30);
        b.position.set(nx,.42,nz);b.visible=true;
      },2500);
    }
  });

  if(!crashing&&t-treeHitTime>1500){
    for(const tr of trees){
      const dx=tr.position.x-pig.position.x,dz=tr.position.z-pig.position.z;
      if(dx*dx+dz*dz<.8){
        treeHitTime=t;crashActive=true;crashStart=t;
        crashOverlay.style.background='rgba(255,80,0,0.45)';
        setTimeout(()=>crashOverlay.style.background='rgba(255,80,0,0)',220);
        if(score>0){score--;scEl.textContent=score;}
        break;
      }
    }
  }

  if(crashing){
    const cp=(t-crashStart)/CRASH_DUR;
    const shk=.18*(1-cp*cp);
    C.position.set(
      pig.position.x-Math.sin(angle)*4+(Math.random()-.5)*shk,
      pig.position.y+2.5+(Math.random()-.5)*shk*.4,
      pig.position.z-Math.cos(angle)*4+(Math.random()-.5)*shk
    );
  } else {
    C.position.set(pig.position.x-Math.sin(angle)*4,pig.position.y+2.5,pig.position.z-Math.cos(angle)*4);
  }
  C.lookAt(pig.position.x+Math.sin(angle)*1.5,pig.position.y+.5,pig.position.z+Math.cos(angle)*1.5);

  for(let i=collectEffects.length-1;i>=0;i--){
    const ef=collectEffects[i];
    if(ef.startT<0)ef.startT=t;
    const cp=Math.min((t-ef.startT)/700,1);
    if(cp>=1){S.remove(ef.g);collectEffects.splice(i,1);continue;}
    ef.ms.forEach((s,idx)=>{
      const a=(idx/ef.ms.length)*Math.PI*2;
      const r=cp*1.4;
      s.position.set(Math.cos(a)*r,Math.sin(cp*Math.PI)*.55+cp*.1,Math.sin(a)*r);
      const sc=(1-cp)*1.6;s.scale.setScalar(sc);
      s.rotation.x+=.15*dt;s.rotation.y+=.2*dt;
    });
    ef.g.position.y=ef.oy;
  }

  R.render(S,C);
}
// === HIGHSCORES ===
const HS_GAME='schweinchen_galopp';
const hsListEl=document.getElementById('hs-list');
const hsNameEl=document.getElementById('hs-name');
const hsBtnEl=document.getElementById('hs-btn');
const hsFormEl=document.getElementById('hs-form');
document.getElementById('hs-replay').addEventListener('click',()=>location.reload());

function secsFromScore(s){const sec=10000-s;const m=Math.floor(sec/60);return m+':'+String(sec%60).padStart(2,'0');}

function renderHSList(scores){
  if(!scores||!scores.length){hsListEl.innerHTML='<div style="color:rgba(255,255,255,.45);text-align:center;padding:4px 0">Noch keine Einträge</div>';return;}
  hsListEl.innerHTML='<div style="font-weight:700;font-size:13px;opacity:.6;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Bestenliste</div>'+
    scores.map((s,i)=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.1)"><span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'.'} ${s.name}</span><span style="font-weight:700">${secsFromScore(s.score)} <span style="opacity:.45;font-size:12px">${s.date}</span></span></div>`).join('');
}

async function showWin(){
  winEl.style.display='flex';
  hsListEl.innerHTML='<div style="color:rgba(255,255,255,.45);text-align:center">Lade…</div>';
  try{const r=await fetch('highscore.php?game='+HS_GAME);const d=await r.json();renderHSList(d.scores);}
  catch(e){hsListEl.innerHTML='<div style="color:rgba(255,100,100,.7);text-align:center">Fehler beim Laden</div>';}
  hsNameEl.focus();
}

hsBtnEl.addEventListener('click',async()=>{
  const name=hsNameEl.value.trim();
  if(!name)return;
  hsBtnEl.disabled=true;hsBtnEl.textContent='…';
  try{
    const r=await fetch('highscore.php?game='+HS_GAME,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,score:finalScore})});
    const d=await r.json();
    renderHSList(d.scores);
    hsFormEl.style.display='none';
  }catch(e){
    hsBtnEl.disabled=false;hsBtnEl.textContent='Eintragen';
    hsListEl.innerHTML='<div style="color:rgba(255,100,100,.7);text-align:center">Fehler beim Speichern</div>';
  }
});

loop(0);

window.addEventListener('resize',()=>{
  W=wrap.clientWidth;H=wrap.clientHeight;
  R.setSize(W,H);C.aspect=W/H;C.updateProjectionMatrix();
});
})();
</script>
</body>
</html>
